name: Fetch Oura Data

on:
  schedule:
    - cron: '0 7 * * *'   # täglich um 7:00 UTC (= 9:00 MESZ)
  workflow_dispatch:        # auch manuell auslösbar

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Oura-Daten abrufen
        env:
          OURA_TOKEN: ${{ secrets.OURA_TOKEN }}
        run: python fetch_oura.py

      - name: data.json committen und pushen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --staged --quiet || git commit -m "chore: Oura-Daten aktualisiert"
          git push
